<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval'; script-src * 'unsafe-inline' 'unsafe-eval'; connect-src * 'unsafe-inline'; img-src * data: blob: 'unsafe-inline'; style-src * 'unsafe-inline';">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎉 热烈祝贺冯佳敏 - 金榜题名</title>
    <style>
        :root {
            --gold: #d4a843;
            --gold-light: #f0d78c;
            --red: #c41e3a;
            --bg: #1a0a0a;
            --card-bg: rgba(30, 12, 12, 0.85);
            --text: #f5e6d3;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', 'STSong', 'Noto Serif SC', 'KaiTi', serif;
            background: var(--bg);
            min-height: 100vh;
            overflow-x: hidden;
            color: var(--text);
            cursor: default;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        #particlesCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        #fireworksCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 200;
            pointer-events: none;
        }

        .main-container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem 1rem;
            gap: 2rem;
        }

        .top-ornament {
            display: flex;
            align-items: center;
            gap: 1rem;
            opacity: 0.9;
        }
        .top-ornament .line {
            width: 80px; height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold-light), transparent);
            border-radius: 1px;
        }
        .top-ornament .diamond {
            width: 14px; height: 14px;
            background: var(--gold);
            transform: rotate(45deg);
            border-radius: 2px;
            box-shadow: 0 0 20px rgba(232, 197, 109, 0.7);
            animation: diamondPulse 2s ease-in-out infinite;
        }
        @keyframes diamondPulse {
            0%, 100% { box-shadow: 0 0 20px rgba(232, 197, 109, 0.7); transform: rotate(45deg) scale(1); }
            50% { box-shadow: 0 0 40px rgba(232, 197, 109, 1), 0 0 60px rgba(255, 200, 80, 0.6); transform: rotate(45deg) scale(1.3); }
        }

        .hero-card {
            background: var(--card-bg);
            border: 2px solid rgba(212, 168, 67, 0.4);
            border-radius: 24px;
            padding: 3rem 2.5rem;
            text-align: center;
            max-width: 650px;
            width: 100%;
            position: relative;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(212,168,67,0.15) inset, 0 0 80px rgba(180,120,40,0.15);
            animation: cardFloat 4s ease-in-out infinite;
        }
        @keyframes cardFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        .hero-card::before, .hero-card::after {
            content: '';
            position: absolute;
            left: 20px; right: 20px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(240,215,140,0.6), transparent);
            border-radius: 1px;
        }
        .hero-card::before { top: -1px; }
        .hero-card::after { bottom: -1px; }

        .corner-badge {
            position: absolute;
            font-size: 2rem;
            opacity: 0.7;
            animation: cornerGlow 3s ease-in-out infinite;
        }
        .corner-badge.top-left { top: -18px; left: -10px; animation-delay: 0s; }
        .corner-badge.top-right { top: -18px; right: -10px; animation-delay: 0.5s; }
        .corner-badge.bottom-left { bottom: -18px; left: -10px; animation-delay: 1s; }
        .corner-badge.bottom-right { bottom: -18px; right: -10px; animation-delay: 1.5s; }
        @keyframes cornerGlow {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.25); }
        }

        .label-badge {
            display: inline-block;
            background: rgba(212,168,67,0.2);
            border: 1px solid rgba(212,168,67,0.5);
            color: var(--gold-light);
            padding: 0.4rem 1.4rem;
            border-radius: 50px;
            font-size: 0.9rem;
            letter-spacing: 0.15em;
            margin-bottom: 1rem;
            backdrop-filter: blur(4px);
        }

        .name-display {
            font-size: 3.2rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            background: linear-gradient(180deg, #fdf5c9 0%, #e8c56d 25%, #d4a843 50%, #c49530 70%, #b8861e 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 3px 8px rgba(200,150,50,0.5));
            margin: 0.5rem 0;
            line-height: 1.3;
            animation: nameShimmer 3s ease-in-out infinite;
            background-size: 200% 200%;
        }
        @keyframes nameShimmer {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .congrats-text { font-size: 1.5rem; color: #f0d78c; letter-spacing: 0.1em; margin: 0.8rem 0 0.3rem; font-weight: 600; }
        .sub-text { font-size: 1rem; color: #c9b896; letter-spacing: 0.06em; margin-bottom: 0.6rem; }

        .unit-highlight {
            display: inline-block;
            background: rgba(196,30,58,0.3);
            border: 1px solid rgba(196,30,58,0.6);
            color: #ffb3b3;
            padding: 0.5rem 1.6rem;
            border-radius: 50px;
            font-size: 1.15rem;
            letter-spacing: 0.12em;
            margin: 1rem 0;
            font-weight: 500;
            backdrop-filter: blur(4px);
            animation: unitGlow 2.5s ease-in-out infinite;
        }
        @keyframes unitGlow {
            0%, 100% { box-shadow: 0 0 15px rgba(196,30,58,0.4); }
            50% { box-shadow: 0 0 35px rgba(220,60,80,0.7), 0 0 50px rgba(196,30,58,0.4); }
        }

        .divider-ornament { display: flex; align-items: center; gap: 0.6rem; justify-content: center; margin: 1.2rem 0; }
        .divider-ornament span { width: 50px; height: 1px; background: rgba(212,168,67,0.5); }
        .divider-ornament .star { font-size: 1.2rem; color: var(--gold); }

        .blessing-quote { font-style: italic; color: #e0d0b0; font-size: 1.05rem; letter-spacing: 0.05em; line-height: 1.8; margin: 1rem 0; padding: 0 1rem; }

        .action-buttons { display: flex; flex-wrap: wrap; gap: 0.8rem; justify-content: center; margin-top: 1.5rem; }
        .btn {
            padding: 0.7rem 1.5rem; border-radius: 50px; border: none; cursor: pointer;
            font-size: 0.95rem; letter-spacing: 0.06em; font-family: inherit;
            transition: all 0.35s cubic-bezier(0.25,0.8,0.25,1.2); font-weight: 500; outline: none;
        }
        .btn-primary {
            background: linear-gradient(135deg, #c41e3a, #a01830); color: #fff;
            border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 6px 20px rgba(196,30,58,0.45);
        }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(196,30,58,0.6); }
        .btn-gold {
            background: linear-gradient(135deg, #d4a843, #b8861e); color: #1a0a0a;
            border: 1px solid rgba(255,255,255,0.3); box-shadow: 0 6px 20px rgba(180,130,40,0.45); font-weight: 700;
        }
        .btn-gold:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(200,150,50,0.6); }
        .btn-outline { background: transparent; border: 1.5px solid rgba(212,168,67,0.6); color: #f0d78c; }
        .btn-outline:hover { background: rgba(212,168,67,0.12); border-color: rgba(240,215,140,0.9); }

        .toast {
            position: fixed; top: 30px; left: 50%;
            transform: translateX(-50%) translateY(-120px);
            background: rgba(40,20,10,0.95); border: 1px solid var(--gold);
            color: var(--gold-light); padding: 0.8rem 2rem; border-radius: 50px;
            font-size: 0.95rem; z-index: 300; backdrop-filter: blur(10px);
            transition: transform 0.5s cubic-bezier(0.175,0.885,0.32,1.275);
            pointer-events: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        .petals-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 2;
        }
        .petal {
            position: absolute; top: -60px; font-size: 1.4rem;
            animation: petalFall linear infinite; opacity: 0.75; pointer-events: none;
        }
        @keyframes petalFall {
            0% { transform: translateY(-5vh) rotate(0deg) translateX(0px); opacity: 0.85; }
            100% { transform: translateY(105vh) rotate(480deg) translateX(-10px); opacity: 0; }
        }

        .preset-panel {
            position: absolute; bottom: calc(100% + 8px); left: 0; right: 0;
            background: rgba(30, 15, 10, 0.95); border: 1px solid rgba(212,168,67,0.6);
            border-radius: 16px; box-shadow: 0 15px 30px rgba(0,0,0,0.6);
            backdrop-filter: blur(15px); z-index: 60; max-height: 240px; overflow-y: auto;
            display: none; animation: fadeSlideIn 0.25s ease;
        }
        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .preset-item {
            padding: 0.7rem 1.2rem; color: #e8d5b0; cursor: pointer;
            border-bottom: 1px solid rgba(212,168,67,0.15); transition: background 0.2s, color 0.2s;
            font-size: 0.9rem; letter-spacing: 0.03em; text-align: left;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .preset-item:last-child { border-bottom: none; }
        .preset-item:hover { background: rgba(212,168,67,0.2); color: #fff; }
        .input-wrapper { position: relative; flex: 1; }

        .modal-content {
            background: var(--card-bg); border: 2px solid rgba(212,168,67,0.5);
            border-radius: 20px; padding: 2rem; max-width: 500px; width: 100%;
            text-align: center; backdrop-filter: blur(20px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.6); position: relative;
        }
        .share-text-box {
            background: rgba(20,10,5,0.8); border: 1px solid rgba(212,168,67,0.5);
            border-radius: 12px; padding: 1rem; color: #f0d78c; margin: 1rem 0;
            font-size: 0.95rem; line-height: 1.6; word-break: break-all; user-select: text;
        }

        @media (max-width: 600px) {
            .hero-card { padding: 2rem 1.5rem; }
            .name-display { font-size: 2.2rem; }
            .btn { padding: 0.55rem 1.2rem; font-size: 0.85rem; }
        }
    </style>
</head>
<body>

    <div class="main-container">

    </div>

    <!-- 分享弹窗 -->
    <div id="shareModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:50;
    background:rgba(0,0,0,0.75);justify-content:center;align-items:center;padding:1rem;">
        <div class="modal-content">

            <button class="btn btn-gold" onclick="copyShareText()" style="margin-top:0.5rem;">📋 复制文案</button>

    <!-- 祝福墙弹窗 -->
    <div id="blessingModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:50;
    background:rgba(0,0,0,0.75);justify-content:center;align-items:center;padding:1rem;">
        <div class="modal-content">
            <button onclick="closeBlessingWall()" style="position:absolute;top:12px;right:16px;
            background:none;border:none;color:var(--gold-light);font-size:1.5rem;cursor:pointer;">✕</button>
            <h3 style="color:var(--gold-light);letter-spacing:0.1em;margin-bottom:1rem;">💌 祝福留言墙</h3>
            <div id="blessingList" style="max-height:250px;overflow-y:auto;text-align:left;padding:0.5rem;
            color:#d5c0a0;font-size:0.9rem;line-height:1.8;">
                <p style="text-align:center;color:#c9b896;">加载中...</p>
            </div>
            <div style="margin-top:1rem;display:flex;gap:0.5rem;align-items:flex-start;">
                <div class="input-wrapper" style="flex:1;">
                    <input type="text" id="blessingInput" placeholder="写下你的祝福并署名..."
                    style="width:100%;padding:0.6rem 1rem;border-radius:50px;border:1px solid rgba(212,168,67,0.5);
                    background:rgba(20,10,5,0.8);color:#f0d78c;outline:none;font-family:inherit;font-size:0.9rem;"
                    onfocus="togglePresetPanel(true)" onblur="setTimeout(()=>togglePresetPanel(false),150)"
                    onkeydown="if(event.key==='Enter')addBlessing()">
                    <div id="presetPanel" class="preset-panel"></div>
                </div>
                <button class="btn btn-gold" style="padding:0.6rem 1.2rem;font-size:0.85rem;flex-shrink:0;" onclick="addBlessing()">发送</button>
            </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        const SUPABASE_URL = 'https://mikhclpvqcwhrpjhfjgi.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_0nT16pm_-1xtxD-B4vzq2g_KrGc4tDc';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const bgCanvas = document.getElementById('particlesCanvas');
        const bgCtx = bgCanvas.getContext('2d');
        const fwCanvas = document.getElementById('fireworksCanvas');
        const fwCtx = fwCanvas.getContext('2d');
        const petalsContainer = document.getElementById('petalsContainer');
        const toastEl = document.getElementById('toast');
        const blessingModal = document.getElementById('blessingModal');
        const blessingInput = document.getElementById('blessingInput');
        const presetPanel = document.getElementById('presetPanel');
        const blessingList = document.getElementById('blessingList');

        let bgParticles = [], w, h, toastTimer;

        function resizeCanvas() {
            w = bgCanvas.width = fwCanvas.width = window.innerWidth;
            h = bgCanvas.height = fwCanvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', () => { resizeCanvas(); initBgParticles(); });

        class BgParticle {
            constructor() {
                this.reset();
                this.y = Math.random() * h;
            }
            reset() {
                this.x = Math.random() * w;
                this.y = -10;
                this.size = Math.random() * 2.5 + 0.8;
                this.speedY = Math.random() * 0.6 + 0.2;
                this.speedX = (Math.random() - 0.5) * 0.3;
                this.opacity = Math.random() * 0.7 + 0.2;
                this.color = Math.random() < 0.35 ? `rgba(240,215,140,${this.opacity})` : `rgba(220,180,130,${this.opacity})`;
            }
            update() {
                this.y += this.speedY;
                this.x += this.speedX + Math.sin(this.y * 0.005) * 0.2;
                if (this.y > h + 15 || this.x < -15 || this.x > w + 15) { this.reset(); this.y = -10; }
            }
            draw() {
                bgCtx.beginPath(); bgCtx.arc(this.x, this.y, this.size, 0, Math.PI*2);
                bgCtx.fillStyle = this.color; bgCtx.fill();
            }
        }

        function initBgParticles() {
            bgParticles = [];
            for (let i = 0; i < Math.min(Math.floor((w*h)/15000), 180); i++) bgParticles.push(new BgParticle());
        }
        initBgParticles();
        (function animateBg() {
            bgCtx.clearRect(0, 0, w, h);
            bgParticles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animateBg);
        })();

        const petalChars = ['🌸','🌺','💮','🏵️','🌷','✿','❀','🌼','🍂','✨'];
        function createPetal() {
            const petal = document.createElement('span');
            petal.classList.add('petal');
            petal.textContent = petalChars[Math.floor(Math.random()*petalChars.length)];
            petal.style.left = Math.random()*95+'%';
            petal.style.fontSize = (Math.random()*1.4+0.9)+'rem';
            petal.style.animationDuration = (Math.random()*8+7)+'s';
            petal.style.animationDelay = Math.random()*3+'s';
            petalsContainer.appendChild(petal);
            setTimeout(() => { if(petal.parentNode) petal.remove(); }, (parseFloat(petal.style.animationDuration)+parseFloat(petal.style.animationDelay))*1000+500);
        }
        for (let i=0;i<20;i++) setTimeout(createPetal, i*350);
        setInterval(() => { if(petalsContainer.children.length<35) createPetal(); }, 1800);

        // 烟花
        function triggerCelebration() {
            petalsContainer.style.display = 'none';
            const centerX = w / 2, centerY = h / 2;
            const fireworks = [];
            for (let i = 0; i < 4; i++) {
                const offsetX = (Math.random() - 0.5) * w * 0.5;
                const offsetY = (Math.random() - 0.5) * h * 0.4;
                const fw = {
                    x: centerX + offsetX, y: centerY + offsetY, particles: [],
                    startTime: performance.now(), duration: 5000 + Math.random() * 1000,
                    color: [`hsl(${Math.random()*30+15},95%,65%)`,`hsl(${Math.random()*20+350},90%,60%)`,`hsl(${Math.random()*15+40},100%,70%)`,`hsl(${Math.random()*10+10},90%,55%)`][Math.floor(Math.random()*4)],
                };
                const count = 250 + Math.floor(Math.random() * 150);
                for (let j = 0; j < count; j++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * 10 + 3;
                    fw.particles.push({
                        x: fw.x, y: fw.y,
                        vx: Math.cos(angle) * speed * (0.6 + Math.random()*0.4),
                        vy: Math.sin(angle) * speed * (0.6 + Math.random()*0.4),
                        life: 1, decay: 0.008 + Math.random()*0.012,
                        size: Math.random() * 3.5 + 2,
                    });
                }
                fireworks.push(fw);
            }
            function drawFireworks(now) {
                fwCtx.clearRect(0, 0, w, h);
                let active = false;
                fireworks.forEach(fw => {
                    const elapsed = now - fw.startTime;
                    if (elapsed > fw.duration) return;
                    active = true;
                    const progress = elapsed / fw.duration;
                    fw.particles.forEach(p => {
                        p.x += p.vx * (1 - progress * 0.3);
                        p.y += p.vy * (1 - progress * 0.3);
                        p.vy += 0.03;
                        p.life -= p.decay;
                        if (p.life > 0) {
                            fwCtx.beginPath(); fwCtx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                            fwCtx.fillStyle = fw.color.replace(')', `, ${p.life})`).replace('hsl', 'hsla');
                            fwCtx.fill();
                            fwCtx.beginPath(); fwCtx.arc(p.x, p.y, p.size*2.2, 0, Math.PI*2);
                            fwCtx.fillStyle = fw.color.replace(')', `, ${p.life*0.25})`).replace('hsl', 'hsla');
                            fwCtx.fill();
                        }
                    });
                    fw.particles = fw.particles.filter(p => p.life > 0);
                });
                if (active) {
                    requestAnimationFrame(drawFireworks);
                } else {
                    petalsContainer.style.display = '';
                    for(let i=0;i<15;i++) setTimeout(createPetal, i*80);
                }
            }
            requestAnimationFrame(drawFireworks);
            for(let i=0;i<20;i++) setTimeout(createPetal, i*60);
            showToast('🎆 烟花绽放！祝贺佳敏！');
        }

        function showToast(msg) {
            clearTimeout(toastTimer);
            toastEl.textContent = msg;
            toastEl.classList.add('show');
            toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2200);
        }

        const shareText = '热烈祝贺冯佳敏考上社会保险中心！金榜题名，前程似锦！';
        function openShareModal() { document.getElementById('shareModal').style.display='flex'; }
        function closeShareModal() { document.getElementById('shareModal').style.display='none'; }
        function copyShareText() {
            (navigator.clipboard?.writeText(shareText) || new Promise(r => { const t=document.createElement('textarea'); t.value=shareText; document.body.appendChild(t); t.select(); document.execCommand('copy'); document.body.removeChild(t); r(); }))
            .then(() => { showToast('✅ 文案已复制！'); closeShareModal(); }).catch(() => showToast('📋 复制失败，请手动选择复制'));
        }
        document.getElementById('shareModal').addEventListener('click', e => { if(e.target===e.currentTarget) closeShareModal(); });

        const presetBlessings = [
            "祝你工作顺利，步步高升  ---- ",
            "愿你在社保中心发光发热，前程似锦  ---- ",
            "佳敏，新的起点，新的辉煌！加油  ---- ",
            "恭喜上岸！服务人民，温暖人心  ---- ",
            "祝贺你，未来可期，不忘初心  ---- ",
            "愿你的职业生涯一帆风顺，幸福常伴  ---- ",
            "金榜题名，实至名归！为你骄傲  ---- ",
            "祝事业有成，天天开心  ---- ",
            "感恩遇见，祝你前程万里，平安喜乐  ---- ",
            "所有的努力都值得，祝贺你！  ---- "
        ];
        presetBlessings.forEach(text => {
            const div = document.createElement('div');
            div.className = 'preset-item';
            div.textContent = text;
            div.addEventListener('mousedown', e => { e.preventDefault(); blessingInput.value=text; blessingInput.setSelectionRange(text.length,text.length); blessingInput.focus(); togglePresetPanel(false); });
            presetPanel.appendChild(div);
        });

        function togglePresetPanel(show) { presetPanel.style.display = show ? 'block' : 'none'; }

        async function loadBlessings() {
            blessingList.innerHTML = '<p style="text-align:center;color:#c9b896;">加载中...</p>';
            const { data, error } = await supabaseClient.from('blessings').select('*').order('created_at', { ascending: false });
            if(error) { blessingList.innerHTML='<p style="text-align:center;color:#c9b896;">加载失败</p>'; return; }
            if(!data.length) { blessingList.innerHTML='<p style="text-align:center;color:#c9b896;">还没有祝福，快来写下第一条吧！</p>'; return; }
            blessingList.innerHTML = data.map(item => `<p style="animation:fadeIn 0.5s ease">💝 ${item.content}</p>`).join('');
        }

        async function addBlessing() {
            const text = blessingInput.value.trim();
            if(!text) { showToast('💬 请选择或输入祝福语～'); return; }
            const { error } = await supabaseClient.from('blessings').insert([{ content: text }]);
            if(error) { showToast('❌ 发送失败'); return; }
            blessingInput.value = '';
            showToast('💌 祝福已发送！');
            await loadBlessings();
            for(let i=0;i<5;i++) setTimeout(createPetal, i*60);
        }

        function showBlessingWall() { blessingModal.style.display='flex'; loadBlessings(); }
        function closeBlessingWall() { blessingModal.style.display='none'; }
        blessingModal.addEventListener('click', e => { if(e.target===blessingModal) closeBlessingWall(); });

        document.head.appendChild(Object.assign(document.createElement('style'), { textContent: '@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}' }));

        document.addEventListener('keydown', e => {
            if(e.key==='f'||e.key==='F') triggerCelebration();
            if(e.key==='s'||e.key==='S') openShareModal();
            if(e.key==='b'||e.key==='B') showBlessingWall();
            if(e.key==='Escape') { closeBlessingWall(); closeShareModal(); }
        });

        window.addEventListener('load', () => { for(let i=0;i<12;i++) setTimeout(createPetal, i*100); });
    </script>
</body>
</html>
